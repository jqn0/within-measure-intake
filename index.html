<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Within Measure — Career Coaching Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #0E0D10; --ink2: #1C1A1D; --paper: #F8F5EF; --cream: #EDE9E1;
  --lime: #C8E040; --lime-dim: rgba(200,224,64,0.12); --lime-dark: #8FAD1A;
  --gold: #C9A84C; --rust: #C05A38; --muted: #6B6875; --border: rgba(200,224,64,0.2);
  --serif: 'Playfair Display', Georgia, serif; --sans: 'Instrument Sans', sans-serif; --mono: 'IBM Plex Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--ink2); color: #E8E4DC; font-family: var(--sans); font-size: 15px; line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.progress-track { position: fixed; top: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.06); z-index: 100; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--lime) 0%, var(--gold) 100%); transition: width 0.5s ease; width: 0%; }
.site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 90; padding: 16px 40px; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(180deg, var(--ink) 0%, transparent 100%); }
.logo { font-family: var(--mono); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--lime); }
.form-shell { min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 100px 24px 80px; }
.section { display: none; max-width: 680px; width: 100%; animation: fadeUp 0.45s ease both; }
.section.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
.section-kicker { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--lime); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.section-kicker::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.section-title { font-family: var(--serif); font-size: clamp(26px, 4vw, 38px); font-weight: 700; color: #F0EBE0; margin-bottom: 10px; }
.section-title em { color: var(--lime); font-style: normal; }
.field-group { margin-bottom: 24px; }
label { display: block; font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
input, textarea, select { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #F0EBE0; padding: 14px; outline: none; }
input:focus, textarea:focus { border-color: var(--lime); }
.btn-next { background: var(--lime); color: var(--ink); border: none; padding: 16px 32px; border-radius: 6px; font-family: var(--mono); font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; width: 100%; margin-top: 20px; }
.hidden { display: none !important; }
.intro-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
.intro-title { font-family: var(--serif); font-size: clamp(36px, 6vw, 58px); color: #F0EBE0; line-height: 1.1; margin-bottom: 20px; }
.intro-title span { color: var(--lime); }
</style>
</head>
<body>

<div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
<header class="site-header" id="site-header" style="display:none;"><div class="logo">Within Measure</div></header>

<div class="intro-wrap" id="intro-screen">
  <div class="intro-inner">
    <h1 class="intro-title">Your <span>Blueprint</span><br/>Starts Here</h1>
    <button class="btn-next" style="width:auto;" onclick="startForm()">Begin Intake ↓</button>
  </div>
</div>

<div class="form-shell hidden" id="form-shell">
  <div class="section" id="section-1">
    <div class="section-kicker">Section 01 — Identity</div>
    <h2 class="section-title">Who <em>are</em> you?</h2>
    <div class="field-group"><label>First Name</label><input type="text" id="first-name"></div>
    <div class="field-group"><label>Last Name</label><input type="text" id="last-name"></div>
    <div class="field-group"><label>Job Title</label><input type="text" id="job-title"></div>
    <button class="btn-next" onclick="showSection(2)">Next: Background →</button>
  </div>

  <div class="section" id="section-2">
    <div class="section-kicker">Section 02 — Background</div>
    <h2 class="section-title">Where have you <em>been</em>?</h2>
    <div class="field-group"><label>Professional Background</label><textarea id="background" rows="6"></textarea></div>
    <button class="btn-next submit" onclick="submitForm()">Generate My Blueprint →</button>
  </div>
</div>

<div class="form-shell hidden" id="output-shell">
  <h2 class="section-title">Intake <em>Complete</em></h2>
  <p>Check your email (jason@withinmeasure.com) for the PDF.</p>
</div>

<script>
// --- PASTE YOUR GOOGLE WEB APP URL HERE ---
const SCRIPT_URL = 'YOUR_GOOGLE_SCRIPT_WEB_APP_URL'; 

function startForm() {
  document.getElementById('intro-screen').classList.add('hidden');
  document.getElementById('form-shell').classList.remove('hidden');
  document.getElementById('site-header').style.display = 'flex';
  showSection(1);
}

function showSection(n) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + n).classList.add('active');
  document.getElementById('progress-fill').style.width = (n/2)*100 + '%';
}

async function submitForm() {
  const btn = document.querySelector('.submit');
  btn.textContent = "Processing...";
  btn.disabled = true;

  const formData = {
    firstName: document.getElementById('first-name').value,
    lastName: document.getElementById('last-name').value,
    jobTitle: document.getElementById('job-title').value,
    background: document.getElementById('background').value
  };

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(formData)
    });
    document.getElementById('form-shell').classList.add('hidden');
    document.getElementById('output-shell').classList.remove('hidden');
  } catch (e) {
    alert("Error sending form. Check console.");
    btn.disabled = false;
  }
}
</script>
</body>
</html>
